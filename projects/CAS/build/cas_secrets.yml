services:
  code-db-ords-deploy:
    secrets:
      - cas_user
      - cas_pwd
      - cas_app_user
      - cas_app_pwd
      - cas_apx_pwd
secrets:
  cas_user:
    name: ${COMPOSE_PROJECT_NAME}_cas_user
    external: true
  cas_pwd:
    name: ${COMPOSE_PROJECT_NAME}_cas_pwd
    external: true
  cas_app_user:
    name: ${COMPOSE_PROJECT_NAME}_cas_app_user
    external: true
  cas_app_pwd:
    name: ${COMPOSE_PROJECT_NAME}_cas_app_pwd
    external: true
  cas_apx_pwd:
    name: ${COMPOSE_PROJECT_NAME}_cas_apx_pwd
    external: true    